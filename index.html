<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Group Status</title>

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg,#667eea,#764ba2);
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.container{
  width:420px;
  background:white;
  border-radius:12px;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
  padding:20px;
}

h1{
  margin:0 0 10px 0;
  font-size:22px;
}

#myInfo{
  font-size:14px;
  color:#666;
  margin-bottom:15px;
}

.status-buttons{
  display:flex;
  gap:10px;
  margin-bottom:20px;
}

.status-buttons button{
  flex:1;
  padding:8px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  font-weight:bold;
  color:white;
}

.online{background:#2ecc71;}
.busy{background:#e74c3c;}
.away{background:#f39c12;}

.user-list{
  border-top:1px solid #eee;
  padding-top:10px;
  max-height:300px;
  overflow:auto;
}

.user-item{
  display:flex;
  align-items:center;
  gap:10px;
  padding:8px;
  border-radius:6px;
}

.user-item:hover{
  background:#f5f5f5;
}

.user-status-dot{
  width:12px;
  height:12px;
  border-radius:50%;
}
</style>
</head>

<body>

<div class="container">

<h1>👥 Group Status</h1>
<div id="myInfo">Загрузка...</div>

<div class="status-buttons">
<button class="online" onclick="changeStatus('Онлайн','#2ecc71')">Онлайн</button>
<button class="busy" onclick="changeStatus('Занят','#e74c3c')">Занят</button>
<button class="away" onclick="changeStatus('Отошел','#f39c12')">Отошел</button>
</div>

<div id="groupList" class="user-list"></div>

</div>


<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const URL = 'https://slsqslloqfkcoljrumqx.supabase.co';
const KEY = 'sb_publishable_F2xESWfujUZML-uwwkSeEA_EEEXP-gf';
const supabase = createClient(URL, KEY);

const MY_ID = '12fd66ff-2683-46a4-8e7a-fcc55d2248fc';

window.changeStatus = async (text, color) => {

const { error } = await supabase
.from('profiles')
.update({ status: text, color: color })
.eq('id', MY_ID);

if (error){
alert("Ошибка! Проверьте RLS политики.");
console.error(error);
}else{
fetchGroup();
}

};

async function fetchGroup(){

const { data, error } = await supabase
.from('profiles')
.select('*')
.order('username', { ascending:true });

if(error){
console.error(error);
return;
}

const list = document.getElementById('groupList');

list.innerHTML = data.map(user => `
<div class="user-item">
<div class="user-status-dot" style="background:${user.color || '#ccc'}"></div>
<div style="flex-grow:1">
<strong>${user.username}</strong><br>
<small style="color:#666">${user.status || 'Статус не задан'}</small>
</div>
</div>
`).join('');

const me = data.find(u => u.id === MY_ID);

if(me){
document.getElementById('myInfo').innerText = `Вы зашли как: ${me.username}`;
}

}

fetchGroup();
setInterval(fetchGroup,3000);

</script>

</body>
</html>
