<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const URL = 'https://slsqslloqfkcoljrumqx.supabase.co';
const KEY = 'sb_publishable_F2xESWfujUZML-uwwkSeEA_EEEXP-gf'; // ваш публичный ключ
const supabase = createClient(URL, KEY);

const MY_ID = '12fd66ff-2683-46a4-8e7a-fcc55d2248fc';

window.changeStatus = async (text, color) => {
  const { error } = await supabase
    .from('profiles')
    .update({ status: text, color: color })
    .eq('id', MY_ID);

  if (error) {
    alert("Ошибка! Проверьте RLS политики в Supabase.");
    console.error(error);
  } else {
    fetchGroup();
  }
};

async function fetchGroup() {
  const { data, error } = await supabase
    .from('profiles')
    .select('*')
    .order('username', { ascending: true });

  if (error) {
    console.error(error);
    return;
  }

  const list = document.getElementById('groupList');

  list.innerHTML = data.map(user => `
    <div class="user-item">
      <div class="user-status-dot" style="background: ${user.color || '#ccc'}"></div>
      <div style="flex-grow:1">
        <strong>${user.username}</strong><br>
        <small style="color:#666">${user.status || 'Статус не задан'}</small>
      </div>
    </div>
  `).join('');

  const me = data.find(u => u.id === MY_ID);

  if (me) {
    document.getElementById('myInfo').innerText =
      `Вы зашли как: ${me.username}`;
  }
}

fetchGroup();
setInterval(fetchGroup, 3000);
</script>
